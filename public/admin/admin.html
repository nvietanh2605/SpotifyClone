<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Admin Dashboard</title>
    <!-- Link to admin styles -->
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <!-- ==================== NAVBAR ==================== -->
    <nav class="admin-navbar">
        <a href="admin.html" class="logo">HEXAGON</a>
        <span class="admin-label">Admin Dashboard</span>
        <button class="logout-btn" id="logoutBtn">Log Out</button>
    </nav>

    <!-- ==================== LAYOUT ==================== -->
    <div class="admin-layout">

        <!-- ==================== SIDEBAR ==================== -->
        <aside class="admin-sidebar">
            <p class="sidebar-title">Manage</p>
            <a href="admin.html" class="sidebar-link active">Song List</a>
            <a href="create-artist.html" class="sidebar-link">Create Artist</a>
            <a href="upload-song.html" class="sidebar-link">Upload Song</a>
            <a href="create-playlist.html" class="sidebar-link">Create Playlist</a>
        </aside>

        <!-- ==================== MAIN CONTENT ==================== -->
        <main class="admin-main">

            <!-- Page title -->
            <h1 class="page-title">Song List</h1>

            <!-- Search bar -->
            <div class="search-bar">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by name, artist or genre..."
                />
                <button id="searchBtn">Search</button>
            </div>

            <!-- Edit and Delete buttons -->
            <div class="action-buttons">
                <button class="btn-secondary" id="editBtn">Edit</button>
                <button class="btn-danger" id="deleteBtn">Delete</button>
            </div>

            <!-- Success and error messages -->
            <div class="alert alert-success" id="successAlert"></div>
            <div class="alert alert-error" id="errorAlert"></div>

            <!-- Songs table -->
            <table class="songs-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Song Name</th>
                        <th>Artist</th>
                        <th>Genre</th>
                        <th>Streams</th>
                    </tr>
                </thead>
                <tbody id="songsTableBody">
                    <!-- Songs will be loaded here by dashboard.js -->
                </tbody>
            </table>

        </main>

    </div>

    <!-- ==================== DELETE CONFIRMATION MODAL ==================== -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>Delete Song</h3>
            <p>Do you want to delete this song?</p>
            <div class="modal-buttons">
                <button class="btn-primary" id="confirmDeleteBtn">Yes</button>
                <button class="btn-secondary" id="cancelDeleteBtn">No</button>
            </div>
        </div>
    </div>

    <!-- Link to dashboard JavaScript -->
    <script src="../js/admin/dashboard.js"></script>

</body>
</html>
