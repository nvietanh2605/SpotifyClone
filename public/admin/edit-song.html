<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Edit Song</title>
    <!-- Link to admin styles -->
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <!-- ==================== NAVBAR ==================== -->
    <nav class="admin-navbar">
        <a href="admin.html" class="logo">HEXAGON</a>
        <span class="admin-label">Admin Dashboard</span>
        <button class="logout-btn" id="logoutBtn">Log Out</button>
    </nav>

    <!-- ==================== LAYOUT ==================== -->
    <div class="admin-layout">

        <!-- ==================== SIDEBAR ==================== -->
        <aside class="admin-sidebar">
            <p class="sidebar-title">Manage</p>
            <a href="admin.html" class="sidebar-link active">Song List</a>
            <a href="create-artist.html" class="sidebar-link">Create Artist</a>
            <a href="upload-song.html" class="sidebar-link">Upload Song</a>
            <a href="create-playlist.html" class="sidebar-link">Create Playlist</a>
            <a href="playlists.html" class="sidebar-link">Playlist List</a>
        </aside>

        <!-- ==================== MAIN CONTENT ==================== -->
        <main class="admin-main">

            <!-- Page title -->
            <h1 class="page-title">Edit Song</h1>

            <!-- Success and error messages -->
            <div class="alert alert-success" id="successAlert"></div>
            <div class="alert alert-error" id="errorAlert"></div>

            <!-- Edit song form -->
            <div class="admin-form">

                <!-- Song name -->
                <div class="form-group">
                    <label for="songName">Song Name</label>
                    <input
                        type="text"
                        id="songName"
                        placeholder="Enter song name"
                    />
                </div>

                <!-- Song cover image -->
                <div class="form-group">
                    <label for="songImage">Song Cover Image</label>
                    <!-- Current image preview -->
                    <img class="image-preview visible" id="imagePreview" src="" alt="Current Image"/>
                    <input
                        type="file"
                        id="songImage"
                        accept="image/*"
                    />
                </div>

                <!-- Artist dropdown -->
                <div class="form-group">
                    <label for="artistSelect">Artist</label>
                    <select id="artistSelect">
                        <option value="">Select an artist</option>
                        <!-- Artists will be loaded here by songs.js -->
                    </select>
                </div>

                <!-- Stream count -->
                <div class="form-group">
                    <label for="streamCount">Stream Count</label>
                    <input
                        type="number"
                        id="streamCount"
                        placeholder="Enter stream count"
                        min="0"
                    />
                </div>

                <!-- Genre dropdown -->
                <div class="form-group">
                    <label for="genreSelect">Genre</label>
                    <select id="genreSelect">
                        <option value="">Select a genre</option>
                        <option value="Classical">Classical</option>
                        <option value="Jazz">Jazz</option>
                        <option value="Pop">Pop</option>
                    </select>
                </div>

                <!-- Form buttons -->
                <div class="action-buttons">
                    <button class="btn-primary" id="saveSongBtn">Save Changes</button>
                    <a href="admin.html" class="btn-secondary">Cancel</a>
                </div>

            </div>

        </main>

    </div>

    <!-- Link to songs JavaScript -->
    <script src="../js/admin/songs.js"></script>

</body>
</html>
