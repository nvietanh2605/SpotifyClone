<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Create Playlist</title>
    <!-- Link to admin styles -->
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <!-- ==================== NAVBAR ==================== -->
    <nav class="admin-navbar">
        <a href="admin.html" class="logo">HEXAGON</a>
        <span class="admin-label">Admin Dashboard</span>
        <button class="logout-btn" id="logoutBtn">Log Out</button>
    </nav>

    <!-- ==================== LAYOUT ==================== -->
    <div class="admin-layout">

        <!-- ==================== SIDEBAR ==================== -->
        <aside class="admin-sidebar">
            <p class="sidebar-title">Manage</p>
            <a href="admin.html" class="sidebar-link">Song List</a>
            <a href="create-artist.html" class="sidebar-link">Create Artist</a>
            <a href="upload-song.html" class="sidebar-link">Upload Song</a>
            <a href="create-playlist.html" class="sidebar-link active">Create Playlist</a>
        </aside>

        <!-- ==================== MAIN CONTENT ==================== -->
        <main class="admin-main">

            <!-- Page title -->
            <h1 class="page-title">Create Playlist</h1>

            <!-- Success and error messages -->
            <div class="alert alert-success" id="successAlert"></div>
            <div class="alert alert-error" id="errorAlert"></div>

            <!-- Playlist details form -->
            <div class="admin-form">

                <!-- Playlist image -->
                <div class="form-group">
                    <label for="playlistImage">Playlist Image</label>
                    <input
                        type="file"
                        id="playlistImage"
                        accept="image/*"
                    />
                    <!-- Image preview -->
                    <img class="image-preview" id="imagePreview" src="" alt="Preview"/>
                </div>

                <!-- Playlist name -->
                <div class="form-group">
                    <label for="playlistName">Playlist Name</label>
                    <input
                        type="text"
                        id="playlistName"
                        placeholder="Enter playlist name"
                    />
                </div>

                <!-- Submit button -->
                <button class="btn-primary" id="createPlaylistBtn">Create Playlist</button>

            </div>

            <!-- ==================== PLAYLIST BUILDER ==================== -->
            <!-- This section appears after playlist is created -->
            <div id="playlistBuilder" style="display: none;">

                <h2 class="page-title" style="margin-top: 32px;">Add Songs to Playlist</h2>

                <!-- Search bar for songs -->
                <div class="search-bar">
                    <input
                        type="text"
                        id="songSearchInput"
                        placeholder="Search by song name, artist or genre..."
                    />
                    <button id="songSearchBtn">Search</button>
                </div>

                <!-- Two column layout -->
                <div class="playlist-builder">

                    <!-- Left: search results -->
                    <div class="playlist-search-results">
                        <h3>Search Results</h3>
                        <div id="searchResults">
                            <!-- Search results will be loaded here -->
                        </div>
                    </div>

                    <!-- Right: songs added to playlist -->
                    <div class="playlist-songs-list">
                        <h3>Songs in Playlist</h3>
                        <div id="playlistSongs">
                            <!-- Added songs will be shown here -->
                        </div>
                    </div>

                </div>

            </div>

        </main>

    </div>

    <!-- Link to playlists JavaScript -->
    <script src="../js/admin/playlists.js"></script>

</body>
</html>
