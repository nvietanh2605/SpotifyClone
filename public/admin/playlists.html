<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Playlist List</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <!-- ==================== NAVBAR ==================== -->
    <nav class="admin-navbar">
        <a href="admin.html" class="logo">HEXAGON</a>
        <span class="admin-label">Admin Dashboard</span>
        <button class="logout-btn" id="logoutBtn">Log Out</button>
    </nav>

    <!-- ==================== LAYOUT ==================== -->
    <div class="admin-layout">

        <!-- ==================== SIDEBAR ==================== -->
        <aside class="admin-sidebar">
            <p class="sidebar-title">Manage</p>
            <a href="admin.html" class="sidebar-link">Song List</a>
            <a href="create-artist.html" class="sidebar-link">Create Artist</a>
            <a href="upload-song.html" class="sidebar-link">Upload Song</a>
            <a href="create-playlist.html" class="sidebar-link">Create Playlist</a>
            <a href="playlists.html" class="sidebar-link active">Playlist List</a>
        </aside>

        <!-- ==================== MAIN CONTENT ==================== -->
        <main class="admin-main">

            <!-- Page title -->
            <h1 class="page-title">Playlist List</h1>

            <!-- Action buttons -->
            <div class="action-buttons">
                <button class="btn-secondary" id="editBtn">Edit</button>
                <button class="btn-danger" id="deleteBtn">Delete</button>
            </div>

            <!-- Success and error messages -->
            <div class="alert alert-success" id="successAlert"></div>
            <div class="alert alert-error" id="errorAlert"></div>

            <!-- Playlists table -->
            <table class="songs-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Playlist Name</th>
                        <th>Publisher</th>
                        <th>Songs</th>
                    </tr>
                </thead>
                <tbody id="playlistsTableBody">
                    <!-- Playlists will be loaded here -->
                </tbody>
            </table>

        </main>

    </div>

    <!-- ==================== DELETE CONFIRMATION MODAL ==================== -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>Delete Playlist</h3>
            <p>Do you want to delete this playlist?</p>
            <div class="modal-buttons">
                <button class="btn-primary" id="confirmDeleteBtn">Yes</button>
                <button class="btn-secondary" id="cancelDeleteBtn">No</button>
            </div>
        </div>
    </div>

    <script src="../js/admin/playlistList.js"></script>

</body>
</html>
