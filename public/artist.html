<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Artist</title>
    <!-- Link to main and player styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/player.css">
    <style>
        /* ==================== ARTIST PAGE STYLES ==================== */
        .artist-header {
            display: flex;
            align-items: flex-end;
            gap: 24px;
            padding: 24px;
            background: linear-gradient(180deg, #3e3e3e 0%, #121212 100%);
            min-height: 280px;
        }

        .artist-header img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .artist-header-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .artist-header-info .artist-type {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
        }

        .artist-header-info .artist-name {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }

        .artist-header-info .artist-followers {
            font-size: 14px;
            color: #b3b3b3;
        }

        /* Artist actions - follow button */
        .artist-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 24px;
        }

        .follow-btn {
            background: none;
            border: 1px solid #b3b3b3;
            border-radius: 50px;
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            padding: 8px 24px;
            transition: border-color 0.2s, color 0.2s;
        }

        .follow-btn:hover {
            border-color: #ffffff;
        }

        .follow-btn.following {
            border-color: #1db954;
            color: #1db954;
        }

        .follow-btn.following:hover {
            border-color: #ffffff;
            color: #ffffff;
        }

        /* Artist description */
        .artist-description {
            padding: 0 24px 24px;
            color: #b3b3b3;
            font-size: 14px;
            max-width: 600px;
            line-height: 1.6;
        }

        /* Songs list section */
        .artist-songs {
            padding: 0 24px 24px;
        }

        .artist-songs h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* Each song row */
        .song-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .song-row:hover {
            background-color: #282828;
        }

        .song-row img {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
        }

        .song-row .song-info {
            flex: 1;
        }

        .song-row .song-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .song-row .song-genre {
            font-size: 12px;
            color: #b3b3b3;
        }

        .song-row .song-streams {
            font-size: 12px;
            color: #b3b3b3;
        }
    </style>
</head>
<body>

    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="index.html" class="sidebar-logo">HEXAGON</a>
            <nav class="sidebar-nav">
                <a href="index.html">
                    <span>&#9750;</span>
                    Home
                </a>
                <a href="search.html">
                    <span>&#9906;</span>
                    Search
                </a>
            </nav>
        </div>
        <div class="sidebar-library">
            <div class="library-header">
                <h2>Your Library</h2>
                <button id="createPlaylistBtn" title="Create Playlist">+</button>
            </div>
            <div id="libraryItems"></div>
        </div>
    </aside>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main-content">

        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-left">
                <button class="nav-arrow" onclick="history.back()">&#8592;</button>
                <button class="nav-arrow" onclick="history.forward()">&#8594;</button>
            </div>
            <div class="navbar-right">

                <!-- Notification bell -->
                <div class="notification-wrapper">
                    <button class="bell-btn" id="bellBtn">&#9825;</button>
                    <span class="notification-badge" id="notificationBadge">0</span>
                    <div class="notification-dropdown" id="notificationDropdown">
                        <div class="notification-dropdown-header">Notifications</div>
                        <div id="notificationList"></div>
                    </div>
                </div>

                <!-- Settings dropdown -->
                <div class="settings-wrapper">
                    <button class="settings-btn" id="settingsBtn">
                        <span class="user-name" id="userName">User</span>
                        <div class="user-avatar" id="userAvatar">U</div>
                    </button>
                    <div class="settings-dropdown" id="settingsDropdown">
                        <a href="account.html">Account Details</a>
                        <hr class="divider">
                        <button id="logoutBtn">Log Out</button>
                    </div>
                </div>

            </div>
        </nav>

        <!-- Artist header -->
        <div class="artist-header" id="artistHeader">
            <img id="artistImage" src="" alt="Artist"/>
            <div class="artist-header-info">
                <span class="artist-type">Artist</span>
                <h1 class="artist-name" id="artistName">Loading...</h1>
                <span class="artist-followers" id="artistFollowers"></span>
            </div>
        </div>

        <!-- Follow button -->
        <div class="artist-actions">
            <button class="follow-btn" id="followBtn">Follow</button>
        </div>

        <!-- Artist description -->
        <p class="artist-description" id="artistDescription"></p>

        <!-- Artist songs -->
        <div class="artist-songs">
            <h2>Songs</h2>
            <div id="artistSongsList"></div>
        </div>

    </main>

    <!-- ==================== MUSIC PLAYER ==================== -->
    <div class="player">
        <div class="player-left" id="playerLeft">
            <div class="player-empty">Select a song to play</div>
        </div>
        <div class="player-center" id="playerCenter" style="display: none;">
            <div class="player-controls">
                <button class="control-btn" id="prevBtn">&#9664;&#9664;</button>
                <button class="play-btn" id="playBtn">&#9654;</button>
                <button class="control-btn" id="nextBtn">&#9654;&#9654;</button>
            </div>
            <div class="player-progress">
                <span class="player-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <span class="player-time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="player-right" id="playerRight" style="display: none;">
            <button class="volume-btn" id="volumeBtn">&#9836;</button>
            <div class="volume-bar" id="volumeBar">
                <div class="volume-fill" id="volumeFill" style="width: 70%"></div>
            </div>
        </div>
    </div>

    <!-- ==================== LOGIN WALL POPUP ==================== -->
    <div class="login-wall-overlay" id="loginWallOverlay">
        <div class="login-wall-popup">
            <div class="login-wall-text">
                <h3>Start listening with our account</h3>
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
            <div class="login-wall-buttons">
                <a href="register.html" class="btn-signup">Sign up here</a>
                <button class="btn-close" id="closeLoginWall">&#10005;</button>
            </div>
        </div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audioPlayer"></audio>

    <!-- Link to JavaScript files -->
    <script src="js/player.js"></script>
    <script src="js/library.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/artist.js"></script>

</body>
</html>
