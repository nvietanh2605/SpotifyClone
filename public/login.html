<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Login</title>
    <!-- Link to auth styles -->
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <!-- Main login container -->
    <div class="auth-container">

        <!-- Logo -->
        <div class="auth-logo">
            <h1>HEXAGON</h1>
        </div>

        <!-- Title -->
        <h2 class="auth-title">Log in to Hexagon</h2>

        <!-- Error message (hidden by default) -->
        <div class="auth-error" id="errorMessage"></div>

        <!-- Login form -->
        <div class="auth-form">

            <!-- Email field -->
            <div class="form-group">
                <label for="email">Email address</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Email address"
                    autocomplete="email"
                />
            </div>

            <!-- Password field -->
            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    autocomplete="current-password"
                />
            </div>

            <!-- Submit button -->
            <button class="auth-btn" id="loginBtn">Log In</button>

        </div>

        <!-- Divider -->
        <hr class="auth-divider">

        <!-- Redirect to register -->
        <p class="auth-redirect">
            Don't have an account?
            <a href="register.html">Sign up here</a>
        </p>

    </div>

    <!-- Link to auth JavaScript -->
    <script src="js/auth.js"></script>

</body>
</html>
