<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Account</title>
    <!-- Link to main and player styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/player.css">
    <style>
        /* ==================== ACCOUNT PAGE STYLES ==================== */
        .account-container {
            padding: 24px;
            max-width: 600px;
        }

        .account-container h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 32px;
        }

        /* Profile avatar circle */
        .account-avatar {
            background-color: #1db954;
            border-radius: 50%;
            color: #000000;
            font-size: 48px;
            font-weight: 700;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        /* Each info row */
        .account-info-row {
            background-color: #282828;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .account-info-row .info-label {
            font-size: 12px;
            color: #b3b3b3;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .account-info-row .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }

        /* Stats section */
        .account-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 24px;
            margin-bottom: 24px;
        }

        .stat-card {
            background-color: #282828;
            border-radius: 8px;
            padding: 20px;
        }

        .stat-card .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #1db954;
            margin-bottom: 4px;
        }

        .stat-card .stat-label {
            font-size: 13px;
            color: #b3b3b3;
        }

        /* Alert messages */
        .alert {
            border-radius: 4px;
            font-size: 14px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.visible {
            display: block;
        }

        .alert-success {
            background-color: #1db954;
            color: #000000;
            font-weight: 600;
        }

        .alert-error {
            background-color: #e91429;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="index.html" class="sidebar-logo">HEXAGON</a>
            <nav class="sidebar-nav">
                <a href="index.html">
                    <span>&#9750;</span>
                    Home
                </a>
                <a href="search.html">
                    <span>&#9906;</span>
                    Search
                </a>
            </nav>
        </div>
        <div class="sidebar-library">
            <div class="library-header">
                <h2>Your Library</h2>
                <button id="createPlaylistBtn" title="Create Playlist">+</button>
            </div>
            <div id="libraryItems"></div>
        </div>
    </aside>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main-content">

        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-left">
                <button class="nav-arrow" onclick="history.back()">&#8592;</button>
                <button class="nav-arrow" onclick="history.forward()">&#8594;</button>
            </div>
            <div class="navbar-right">

                <!-- Notification bell -->
                <div class="notification-wrapper">
                    <button class="bell-btn" id="bellBtn">&#9825;</button>
                    <span class="notification-badge" id="notificationBadge">0</span>
                    <div class="notification-dropdown" id="notificationDropdown">
                        <div class="notification-dropdown-header">Notifications</div>
                        <div id="notificationList"></div>
                    </div>
                </div>

                <!-- Settings dropdown -->
                <div class="settings-wrapper">
                    <button class="settings-btn" id="settingsBtn">
                        <span class="user-name" id="userName">User</span>
                        <div class="user-avatar" id="userAvatar">U</div>
                    </button>
                    <div class="settings-dropdown" id="settingsDropdown">
                        <a href="account.html">Account Details</a>
                        <hr class="divider">
                        <button id="logoutBtn">Log Out</button>
                    </div>
                </div>

            </div>
        </nav>

        <!-- Account content -->
        <div class="account-container">

            <h1>Account Details</h1>

            <!-- Success and error messages -->
            <div class="alert alert-success" id="successAlert"></div>
            <div class="alert alert-error" id="errorAlert"></div>

            <!-- Avatar -->
            <div class="account-avatar" id="accountAvatar">U</div>

            <!-- Name -->
            <div class="account-info-row">
                <div>
                    <div class="info-label">Full Name</div>
                    <div class="info-value" id="accountName">Loading...</div>
                </div>
            </div>

            <!-- Email -->
            <div class="account-info-row">
                <div>
                    <div class="info-label">Email Address</div>
                    <div class="info-value" id="accountEmail">Loading...</div>
                </div>
            </div>

            <!-- Stats -->
            <div class="account-stats">
                <div class="stat-card">
                    <div class="stat-number" id="followingCount">0</div>
                    <div class="stat-label">Artists Following</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="playlistCount">0</div>
                    <div class="stat-label">Playlists Saved</div>
                </div>
            </div>

        </div>

    </main>

    <!-- ==================== MUSIC PLAYER ==================== -->
    <div class="player">
        <div class="player-left" id="playerLeft">
            <div class="player-empty">Select a song to play</div>
        </div>
        <div class="player-center" id="playerCenter" style="display: none;">
            <div class="player-controls">
                <button class="control-btn" id="prevBtn">&#9664;&#9664;</button>
                <button class="play-btn" id="playBtn">&#9654;</button>
                <button class="control-btn" id="nextBtn">&#9654;&#9654;</button>
            </div>
            <div class="player-progress">
                <span class="player-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <span class="player-time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="player-right" id="playerRight" style="display: none;">
            <button class="volume-btn" id="volumeBtn">&#9836;</button>
            <div class="volume-bar" id="volumeBar">
                <div class="volume-fill" id="volumeFill" style="width: 70%"></div>
            </div>
        </div>
    </div>

    <!-- ==================== LOGIN WALL POPUP ==================== -->
    <div class="login-wall-overlay" id="loginWallOverlay">
        <div class="login-wall-popup">
            <div class="login-wall-text">
                <h3>Start listening with our account</h3>
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
            <div class="login-wall-buttons">
                <a href="register.html" class="btn-signup">Sign up here</a>
                <button class="btn-close" id="closeLoginWall">&#10005;</button>
            </div>
        </div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audioPlayer"></audio>

    <!-- Link to JavaScript files -->
    <script src="js/player.js"></script>
    <script src="js/library.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/account.js"></script>

</body>
</html>
