<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Account</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/player.css">
    <style>
        .account-container { padding: 24px; max-width: 600px; }
        .account-container h1 { font-size: 28px; font-weight: 700; margin-bottom: 32px; }
        .account-avatar { background-color: #1db954; border-radius: 50%; color: #000000; font-size: 48px; font-weight: 700; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .account-info-row { background-color: #282828; border-radius: 8px; padding: 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .account-info-row .info-label { font-size: 12px; color: #b3b3b3; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .account-info-row .info-value { font-size: 16px; font-weight: 600; color: #ffffff; }
        .account-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 24px; margin-bottom: 24px; }
        .stat-card { background-color: #282828; border-radius: 8px; padding: 20px; }
        .stat-card .stat-number { font-size: 32px; font-weight: 700; color: #1db954; margin-bottom: 4px; }
        .stat-card .stat-label { font-size: 13px; color: #b3b3b3; }
        .alert { border-radius: 4px; font-size: 14px; padding: 12px 16px; margin-bottom: 20px; display: none; }
        .alert.visible { display: block; }
        .alert-success { background-color: #1db954; color: #000000; font-weight: 600; }
        .alert-error { background-color: #e91429; color: #ffffff; }
    </style>
</head>
<body>

    <!-- ==================== NAVBAR ==================== -->
    <nav class="navbar">

        <!-- Left - logo -->
        <a href="index.html" class="navbar-logo">HEXAGON</a>

        <!-- Center - home button and search bar -->
        <div class="navbar-center">
            <a href="index.html" class="navbar-home-btn" title="Home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3L2 12h3v9h6v-6h2v6h6v-9h3L12 3z"/>
                </svg>
            </a>
            <div class="navbar-search-wrapper">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="11" cy="11" r="6"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input
                    type="text"
                    class="navbar-search-input"
                    id="navSearchInput"
                    placeholder="What do you want to play?"
                />
            </div>
        </div>

        <!-- Right - bell and settings -->
        <div class="navbar-right">
            <div class="notification-wrapper">
                <button class="bell-btn" id="bellBtn">&#9825;</button>
                <span class="notification-badge" id="notificationBadge">0</span>
                <div class="notification-dropdown" id="notificationDropdown">
                    <div class="notification-dropdown-header">Notifications</div>
                    <div id="notificationList"></div>
                </div>
            </div>
            <div class="settings-wrapper">
                <button class="settings-btn" id="settingsBtn">
                    <span class="user-name" id="userName">User</span>
                    <div class="user-avatar" id="userAvatar">U</div>
                </button>
                <div class="settings-dropdown" id="settingsDropdown">
                    <a href="account.html">Account Details</a>
                    <hr class="divider">
                    <button id="logoutBtn">Log Out</button>
                </div>
            </div>
        </div>

    </nav>

    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar">
        <div class="sidebar-library">
            <div class="library-header">
                <h2>Your Library</h2>
                <button id="createPlaylistBtn" title="Create Playlist">+</button>
            </div>
            <div id="libraryItems"></div>
        </div>
    </aside>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main-content">

        <!-- Account content -->
        <div class="account-container">
            <h1>Account Details</h1>
            <div class="alert alert-success" id="successAlert"></div>
            <div class="alert alert-error" id="errorAlert"></div>
            <div class="account-avatar" id="accountAvatar">U</div>
            <div class="account-info-row">
                <div>
                    <div class="info-label">Full Name</div>
                    <div class="info-value" id="accountName">Loading...</div>
                </div>
            </div>
            <div class="account-info-row">
                <div>
                    <div class="info-label">Email Address</div>
                    <div class="info-value" id="accountEmail">Loading...</div>
                </div>
            </div>
            <div class="account-stats">
                <div class="stat-card">
                    <div class="stat-number" id="followingCount">0</div>
                    <div class="stat-label">Artists Following</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="playlistCount">0</div>
                    <div class="stat-label">Playlists Saved</div>
                </div>
            </div>
        </div>

    </main>

    <!-- ==================== MUSIC PLAYER ==================== -->
    <div class="player">
        <div class="player-left" id="playerLeft">
            <div class="player-empty">Select a song to play</div>
        </div>
        <div class="player-center" id="playerCenter" style="display: none;">
            <div class="player-controls">
                <button class="control-btn" id="prevBtn" title="Previous">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M3.3 1a.7.7 0 0 1 .7.7v5.15l9.95-5.744a.7.7 0 0 1 1.05.606v12.575a.7.7 0 0 1-1.05.607L4 9.149V14.3a.7.7 0 0 1-.7.7H1.7a.7.7 0 0 1-.7-.7V1.7a.7.7 0 0 1 .7-.7h1.6z"/>
                    </svg>
                </button>
                <button class="play-btn" id="playBtn" title="Play">
                    <svg id="playIcon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288V1.713z"/>
                    </svg>
                    <svg id="pauseIcon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display: none;">
                        <path d="M2.7 1a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7H2.7zm8 0a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7h-2.6z"/>
                    </svg>
                </button>
                <button class="control-btn" id="nextBtn" title="Next">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M12.7 1a.7.7 0 0 0-.7.7v5.15L2.05 1.107A.7.7 0 0 0 1 1.713v12.575a.7.7 0 0 0 1.05.607L12 9.149V14.3a.7.7 0 0 0 .7.7h1.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7h-1.6z"/>
                    </svg>
                </button>
                <button class="loop-btn" id="loopBtn" title="Loop">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17 17H7V14L3 18L7 22V19H19V13H17M7 7H17V10L21 6L17 2V5H5V11H7V7Z"/>
                    </svg>
                </button>
            </div>
            <div class="player-progress">
                <span class="player-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <span class="player-time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="player-right" id="playerRight" style="display: none;">
            <button class="volume-btn" id="volumeBtn" title="Mute">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M9.741.85a.75.75 0 0 1 .375.65v13a.75.75 0 0 1-1.125.65l-6.925-4a3.642 3.642 0 0 1-1.33-4.967 3.639 3.639 0 0 1 1.33-1.332l6.925-4a.75.75 0 0 1 .75 0zm-6.924 5.3a2.139 2.139 0 0 0 0 3.7l5.8 3.35V2.8l-5.8 3.35zm8.683 4.29V5.56a2.75 2.75 0 0 1 0 4.88z"/>
                </svg>
            </button>
            <div class="volume-bar" id="volumeBar">
                <div class="volume-fill" id="volumeFill" style="width: 70%"></div>
            </div>
        </div>
    </div>

    <!-- ==================== LOGIN WALL POPUP ==================== -->
    <div class="login-wall-overlay" id="loginWallOverlay">
        <div class="login-wall-popup">
            <div class="login-wall-text">
                <h3>Start listening with our account</h3>
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
            <div class="login-wall-buttons">
                <a href="register.html" class="btn-signup">Sign up here</a>
                <button class="btn-close" id="closeLoginWall">&#10005;</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script src="js/player.js"></script>
    <script src="js/library.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/account.js"></script>

</body>
</html>
