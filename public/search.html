<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Search</title>
    <!-- Link to main and player styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/player.css">
    <style>
        /* ==================== SEARCH PAGE STYLES ==================== */
        .search-container {
            padding: 24px;
        }

        .search-input-wrapper {
            position: relative;
            max-width: 480px;
            margin-bottom: 32px;
        }

        .search-input-wrapper input {
            background-color: #ffffff;
            border: none;
            border-radius: 50px;
            color: #000000;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 20px 12px 48px;
            width: 100%;
            outline: none;
        }

        .search-input-wrapper .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #000000;
        }

        .search-results-section {
            margin-bottom: 32px;
        }

        .search-results-section h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* Song result row */
        .song-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .song-row:hover {
            background-color: #282828;
        }

        .song-row img {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
        }

        .song-row .song-info {
            flex: 1;
        }

        .song-row .song-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .song-row .song-artist {
            font-size: 12px;
            color: #b3b3b3;
        }

        .song-row .song-genre {
            font-size: 12px;
            color: #b3b3b3;
        }

        /* Artist result card */
        .artist-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .artist-card:hover {
            background-color: #282828;
        }

        .artist-card img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
        }

        .artist-card .artist-info .artist-name {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .artist-card .artist-info .artist-type {
            font-size: 12px;
            color: #b3b3b3;
        }

        .no-results {
            color: #b3b3b3;
            font-size: 14px;
            padding: 16px 0;
        }
    </style>
</head>
<body>

    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="index.html" class="sidebar-logo">HEXAGON</a>
            <nav class="sidebar-nav">
                <a href="index.html">
                    <span>&#9750;</span>
                    Home
                </a>
                <a href="search.html" class="active">
                    <span>&#9906;</span>
                    Search
                </a>
            </nav>
        </div>
        <div class="sidebar-library">
            <div class="library-header">
                <h2>Your Library</h2>
                <button id="createPlaylistBtn" title="Create Playlist">+</button>
            </div>
            <div id="libraryItems"></div>
        </div>
    </aside>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main-content">

        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-left">
                <button class="nav-arrow" onclick="history.back()">&#8592;</button>
                <button class="nav-arrow" onclick="history.forward()">&#8594;</button>
            </div>
            <div class="navbar-right">

                <!-- Notification bell -->
                <div class="notification-wrapper">
                    <button class="bell-btn" id="bellBtn">&#9825;</button>
                    <span class="notification-badge" id="notificationBadge">0</span>
                    <div class="notification-dropdown" id="notificationDropdown">
                        <div class="notification-dropdown-header">Notifications</div>
                        <div id="notificationList"></div>
                    </div>
                </div>

                <!-- Settings dropdown -->
                <div class="settings-wrapper">
                    <button class="settings-btn" id="settingsBtn">
                        <span class="user-name" id="userName">User</span>
                        <div class="user-avatar" id="userAvatar">U</div>
                    </button>
                    <div class="settings-dropdown" id="settingsDropdown">
                        <a href="account.html">Account Details</a>
                        <hr class="divider">
                        <button id="logoutBtn">Log Out</button>
                    </div>
                </div>

            </div>
        </nav>

        <!-- Search content -->
        <div class="search-container">

            <!-- Search input -->
            <div class="search-input-wrapper">
                <span class="search-icon">&#9906;</span>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="What do you want to listen to?"
                    autofocus
                />
            </div>

            <!-- Song results -->
            <div class="search-results-section" id="songResultsSection" style="display: none;">
                <h2>Songs</h2>
                <div id="songResults"></div>
            </div>

            <!-- Artist results -->
            <div class="search-results-section" id="artistResultsSection" style="display: none;">
                <h2>Artists</h2>
                <div id="artistResults"></div>
            </div>

            <!-- No results message -->
            <div class="no-results" id="noResults" style="display: none;">
                No results found for your search
            </div>

        </div>

    </main>

    <!-- ==================== MUSIC PLAYER ==================== -->
    <div class="player">
        <div class="player-left" id="playerLeft">
            <div class="player-empty">Select a song to play</div>
        </div>
        <div class="player-center" id="playerCenter" style="display: none;">
            <div class="player-controls">
                <button class="control-btn" id="prevBtn">&#9664;&#9664;</button>
                <button class="play-btn" id="playBtn">&#9654;</button>
                <button class="control-btn" id="nextBtn">&#9654;&#9654;</button>
            </div>
            <div class="player-progress">
                <span class="player-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <span class="player-time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="player-right" id="playerRight" style="display: none;">
            <button class="volume-btn" id="volumeBtn">&#9836;</button>
            <div class="volume-bar" id="volumeBar">
                <div class="volume-fill" id="volumeFill" style="width: 70%"></div>
            </div>
        </div>
    </div>

    <!-- ==================== LOGIN WALL POPUP ==================== -->
    <div class="login-wall-overlay" id="loginWallOverlay">
        <div class="login-wall-popup">
            <div class="login-wall-text">
                <h3>Start listening with our account</h3>
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
            <div class="login-wall-buttons">
                <a href="register.html" class="btn-signup">Sign up here</a>
                <button class="btn-close" id="closeLoginWall">&#10005;</button>
            </div>
        </div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audioPlayer"></audio>

    <!-- Link to JavaScript files -->
    <script src="js/player.js"></script>
    <script src="js/library.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/search.js"></script>

</body>
</html>
