<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Playlist</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/player.css">
    <style>
        .playlist-header { display: flex; align-items: flex-end; gap: 24px; padding: 24px; background: linear-gradient(180deg, #3e3e3e 0%, #121212 100%); min-height: 280px; }
        .playlist-header img { width: 160px; height: 160px; border-radius: 8px; object-fit: cover; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .playlist-header-info { display: flex; flex-direction: column; gap: 8px; }
        .playlist-header-info .playlist-type { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #ffffff; }
        .playlist-header-info .playlist-name { font-size: 48px; font-weight: 700; color: #ffffff; line-height: 1; }
        .playlist-header-info .playlist-count { font-size: 14px; color: #b3b3b3; }
        .playlist-actions { display: flex; align-items: center; gap: 16px; padding: 24px; }
        .save-btn { background: none; border: 1px solid #b3b3b3; border-radius: 50px; color: #ffffff; cursor: pointer; font-size: 14px; font-weight: 700; padding: 8px 24px; transition: border-color 0.2s; }
        .save-btn:hover { border-color: #ffffff; }
        .save-btn.saved { border-color: #1db954; color: #1db954; }
        .edit-btn { background: none; border: 1px solid #b3b3b3; border-radius: 50px; color: #ffffff; cursor: pointer; font-size: 14px; font-weight: 700; padding: 8px 24px; transition: border-color 0.2s; }
        .edit-btn:hover { border-color: #ffffff; }
        .delete-btn { background: none; border: 1px solid #e91429; border-radius: 50px; color: #e91429; cursor: pointer; font-size: 14px; font-weight: 700; padding: 8px 24px; transition: background-color 0.2s, color 0.2s; }
        .delete-btn:hover { background-color: #e91429; color: #ffffff; }
        .playlist-songs { padding: 0 24px 24px; }
        .playlist-songs h2 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
        .song-row { display: flex; align-items: center; gap: 16px; padding: 8px; border-radius: 4px; cursor: pointer; transition: background-color 0.2s; }
        .song-row:hover { background-color: #282828; }
        .song-row img { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; }
        .song-row .song-info { flex: 1; }
        .song-row .song-name { font-size: 14px; font-weight: 600; color: #ffffff; margin-bottom: 2px; }
        .song-row .song-artist { font-size: 12px; color: #b3b3b3; }
        .song-row .song-streams { font-size: 12px; color: #b3b3b3; }
        .remove-song-btn { background: none; border: 1px solid #535353; border-radius: 50px; color: #b3b3b3; cursor: pointer; font-size: 12px; padding: 4px 12px; transition: border-color 0.2s, color 0.2s; display: none; }
        .song-row:hover .remove-song-btn { display: block; }
        .remove-song-btn:hover { border-color: #e91429; color: #e91429; }
        .edit-form { background-color: #282828; border-radius: 8px; padding: 24px; margin: 0 24px 24px; display: none; }
        .edit-form.visible { display: block; }
        .edit-form h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .edit-form .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .edit-form .form-group label { font-size: 14px; font-weight: 600; color: #ffffff; }
        .edit-form .form-group input { background-color: #3e3e3e; border: 1px solid #535353; border-radius: 4px; color: #ffffff; font-size: 14px; padding: 12px 16px; outline: none; transition: border-color 0.2s; }
        .edit-form .form-group input:focus { border-color: #ffffff; }
        .edit-form .form-group input[type="file"] { padding: 8px; cursor: pointer; }
        .edit-form-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .btn-save { background-color: #1db954; border: none; border-radius: 50px; color: #000000; cursor: pointer; font-size: 14px; font-weight: 700; padding: 10px 24px; transition: background-color 0.2s; }
        .btn-save:hover { background-color: #1ed760; }
        .btn-cancel { background: none; border: 1px solid #535353; border-radius: 50px; color: #ffffff; cursor: pointer; font-size: 14px; font-weight: 600; padding: 10px 24px; transition: border-color 0.2s; }
        .btn-cancel:hover { border-color: #ffffff; }
        .alert { border-radius: 4px; font-size: 14px; padding: 12px 16px; margin: 0 24px 16px; display: none; }
        .alert.visible { display: block; }
        .alert-success { background-color: #1db954; color: #000000; font-weight: 600; }
        .alert-error { background-color: #e91429; color: #ffffff; }
        .modal-overlay { background-color: rgba(0,0,0,0.7); position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 200; display: none; }
        .modal-overlay.visible { display: flex; }
        .modal { background-color: #282828; border-radius: 8px; padding: 32px; max-width: 400px; width: 90%; text-align: center; }
        .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
        .modal p { color: #b3b3b3; font-size: 14px; margin-bottom: 24px; }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; }
        .btn-confirm-delete { background-color: #e91429; border: none; border-radius: 50px; color: #ffffff; cursor: pointer; font-size: 14px; font-weight: 700; padding: 10px 24px; transition: background-color 0.2s; }
        .btn-confirm-delete:hover { background-color: #ff1f38; }
        .btn-cancel-delete { background: none; border: 1px solid #535353; border-radius: 50px; color: #ffffff; cursor: pointer; font-size: 14px; font-weight: 600; padding: 10px 24px; transition: border-color 0.2s; }
        .btn-cancel-delete:hover { border-color: #ffffff; }
        .create-playlist-form { padding: 24px; max-width: 500px; }
        .create-playlist-form h1 { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .form-group label { font-size: 14px; font-weight: 600; }
        .form-group input { background-color: #3e3e3e; border: 1px solid #535353; border-radius: 4px; color: #ffffff; font-size: 14px; padding: 12px 16px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #ffffff; }
        .form-group input[type="file"] { padding: 8px; cursor: pointer; }
        .image-preview { width: 120px; height: 120px; border-radius: 8px; object-fit: cover; display: none; margin-top: 8px; }
        .image-preview.visible { display: block; }
        .btn-primary { background-color: #1db954; border: none; border-radius: 50px; color: #000000; cursor: pointer; font-size: 14px; font-weight: 700; padding: 12px 32px; transition: background-color 0.2s; }
        .btn-primary:hover { background-color: #1ed760; }
        .playlist-song-search { padding: 24px; }
        .playlist-song-search h2 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
        .search-bar { display: flex; gap: 12px; margin-bottom: 16px; }
        .search-bar input { background-color: #282828; border: 1px solid #535353; border-radius: 50px; color: #ffffff; font-size: 14px; padding: 12px 20px; width: 100%; max-width: 400px; outline: none; }
        .search-bar button { background-color: #ffffff; border: none; border-radius: 50px; color: #000000; cursor: pointer; font-size: 14px; font-weight: 700; padding: 12px 24px; }
        .song-result-row { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-radius: 4px; transition: background-color 0.2s; }
        .song-result-row:hover { background-color: #282828; }
        .song-result-row .song-info { display: flex; align-items: center; gap: 12px; }
        .song-result-row img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .song-result-row .song-name { font-size: 14px; font-weight: 600; }
        .song-result-row .song-artist { font-size: 12px; color: #b3b3b3; }
        .add-btn { background-color: #1db954; border: none; border-radius: 50px; color: #000000; cursor: pointer; font-size: 12px; font-weight: 700; padding: 6px 14px; }
        .remove-btn { background: none; border: 1px solid #535353; border-radius: 50px; color: #ffffff; cursor: pointer; font-size: 12px; padding: 6px 14px; }
    </style>
</head>
<body>

    <!-- ==================== NAVBAR ==================== -->
    <nav class="navbar">

        <!-- Left - logo -->
        <a href="index.html" class="navbar-logo">HEXAGON</a>

        <!-- Center - home button and search bar -->
        <div class="navbar-center">
            <a href="index.html" class="navbar-home-btn" title="Home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3L2 12h3v9h6v-6h2v6h6v-9h3L12 3z"/>
                </svg>
            </a>
            <div class="navbar-search-wrapper">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="11" cy="11" r="6"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input
                    type="text"
                    class="navbar-search-input"
                    id="navSearchInput"
                    placeholder="What do you want to play?"
                />
            </div>
        </div>

        <!-- Right - bell and settings -->
        <div class="navbar-right">
            <div class="notification-wrapper">
                <button class="bell-btn" id="bellBtn">&#9825;</button>
                <span class="notification-badge" id="notificationBadge">0</span>
                <div class="notification-dropdown" id="notificationDropdown">
                    <div class="notification-dropdown-header">Notifications</div>
                    <div id="notificationList"></div>
                </div>
            </div>
            <div class="settings-wrapper">
                <button class="settings-btn" id="settingsBtn">
                    <span class="user-name" id="userName">User</span>
                    <div class="user-avatar" id="userAvatar">U</div>
                </button>
                <div class="settings-dropdown" id="settingsDropdown">
                    <a href="account.html">Account Details</a>
                    <hr class="divider">
                    <button id="logoutBtn">Log Out</button>
                </div>
            </div>
        </div>

    </nav>

    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar">
        <div class="sidebar-library">
            <div class="library-header">
                <h2>Your Library</h2>
                <button id="createPlaylistBtn" title="Create Playlist">+</button>
            </div>
            <div id="libraryItems"></div>
        </div>
    </aside>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main-content">

        <!-- Alert messages -->
        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>

        <!-- Edit form (hidden by default) -->
        <div class="edit-form" id="editForm">
            <h2>Edit Playlist</h2>
            <div class="form-group">
                <label for="editPlaylistName">Playlist Name</label>
                <input type="text" id="editPlaylistName" placeholder="Enter playlist name" />
            </div>
            <div class="form-group">
                <label for="editPlaylistImage">Playlist Image</label>
                <input type="file" id="editPlaylistImage" accept="image/*" />
            </div>
            <div class="edit-form-buttons">
                <button class="btn-save" id="saveEditBtn">Save Changes</button>
                <button class="btn-cancel" id="cancelEditBtn">Cancel</button>
            </div>
        </div>

        <!-- Page content -->
        <div id="pageContent"></div>

    </main>

    <!-- ==================== MUSIC PLAYER ==================== -->
    <div class="player">
        <div class="player-left" id="playerLeft">
            <div class="player-empty">Select a song to play</div>
        </div>
        <div class="player-center" id="playerCenter" style="display: none;">
            <div class="player-controls">
                <button class="control-btn" id="prevBtn" title="Previous">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M3.3 1a.7.7 0 0 1 .7.7v5.15l9.95-5.744a.7.7 0 0 1 1.05.606v12.575a.7.7 0 0 1-1.05.607L4 9.149V14.3a.7.7 0 0 1-.7.7H1.7a.7.7 0 0 1-.7-.7V1.7a.7.7 0 0 1 .7-.7h1.6z"/>
                    </svg>
                </button>
                <button class="play-btn" id="playBtn" title="Play">
                    <svg id="playIcon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288V1.713z"/>
                    </svg>
                    <svg id="pauseIcon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display: none;">
                        <path d="M2.7 1a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7H2.7zm8 0a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7h-2.6z"/>
                    </svg>
                </button>
                <button class="control-btn" id="nextBtn" title="Next">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M12.7 1a.7.7 0 0 0-.7.7v5.15L2.05 1.107A.7.7 0 0 0 1 1.713v12.575a.7.7 0 0 0 1.05.607L12 9.149V14.3a.7.7 0 0 0 .7.7h1.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7h-1.6z"/>
                    </svg>
                </button>
                <button class="loop-btn" id="loopBtn" title="Loop">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17 17H7V14L3 18L7 22V19H19V13H17M7 7H17V10L21 6L17 2V5H5V11H7V7Z"/>
                    </svg>
                </button>
            </div>
            <div class="player-progress">
                <span class="player-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <span class="player-time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="player-right" id="playerRight" style="display: none;">
            <button class="volume-btn" id="volumeBtn" title="Mute">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M9.741.85a.75.75 0 0 1 .375.65v13a.75.75 0 0 1-1.125.65l-6.925-4a3.642 3.642 0 0 1-1.33-4.967 3.639 3.639 0 0 1 1.33-1.332l6.925-4a.75.75 0 0 1 .75 0zm-6.924 5.3a2.139 2.139 0 0 0 0 3.7l5.8 3.35V2.8l-5.8 3.35zm8.683 4.29V5.56a2.75 2.75 0 0 1 0 4.88z"/>
                </svg>
            </button>
            <div class="volume-bar" id="volumeBar">
                <div class="volume-fill" id="volumeFill" style="width: 70%"></div>
            </div>
        </div>
    </div>

    <!-- ==================== LOGIN WALL POPUP ==================== -->
    <div class="login-wall-overlay" id="loginWallOverlay">
        <div class="login-wall-popup">
            <div class="login-wall-text">
                <h3>Start listening with our account</h3>
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
            <div class="login-wall-buttons">
                <a href="register.html" class="btn-signup">Sign up here</a>
                <button class="btn-close" id="closeLoginWall">&#10005;</button>
            </div>
        </div>
    </div>

    <!-- ==================== DELETE CONFIRMATION MODAL ==================== -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>Delete Playlist</h3>
            <p>Are you sure you want to delete this playlist? This action cannot be undone.</p>
            <div class="modal-buttons">
                <button class="btn-confirm-delete" id="confirmDeleteBtn">Yes, Delete</button>
                <button class="btn-cancel-delete" id="cancelDeleteBtn">Cancel</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script src="js/player.js"></script>
    <script src="js/library.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/playlist.js"></script>

</body>
</html>
