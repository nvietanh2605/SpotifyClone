<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Playlist</title>
    <!-- Link to main and player styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/player.css">
    <style>
        /* ==================== PLAYLIST PAGE STYLES ==================== */
        .playlist-header {
            display: flex;
            align-items: flex-end;
            gap: 24px;
            padding: 24px;
            background: linear-gradient(180deg, #3e3e3e 0%, #121212 100%);
            min-height: 280px;
        }

        .playlist-header img {
            width: 160px;
            height: 160px;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .playlist-header-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .playlist-header-info .playlist-type {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
        }

        .playlist-header-info .playlist-name {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }

        .playlist-header-info .playlist-count {
            font-size: 14px;
            color: #b3b3b3;
        }

        /* Playlist actions */
        .playlist-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 24px;
        }

        .save-btn {
            background: none;
            border: 1px solid #b3b3b3;
            border-radius: 50px;
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            padding: 8px 24px;
            transition: border-color 0.2s;
        }

        .save-btn:hover {
            border-color: #ffffff;
        }

        .save-btn.saved {
            border-color: #1db954;
            color: #1db954;
        }

        /* Songs list */
        .playlist-songs {
            padding: 0 24px 24px;
        }

        .playlist-songs h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* Song row */
        .song-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .song-row:hover {
            background-color: #282828;
        }

        .song-row img {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
        }

        .song-row .song-info {
            flex: 1;
        }

        .song-row .song-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .song-row .song-artist {
            font-size: 12px;
            color: #b3b3b3;
        }

        .song-row .song-streams {
            font-size: 12px;
            color: #b3b3b3;
        }

        /* ==================== CREATE PLAYLIST FORM ==================== */
        .create-playlist-form {
            padding: 24px;
            max-width: 500px;
        }

        .create-playlist-form h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input {
            background-color: #3e3e3e;
            border: 1px solid #535353;
            border-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            padding: 12px 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #ffffff;
        }

        .form-group input[type="file"] {
            padding: 8px;
            cursor: pointer;
        }

        .image-preview {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            display: none;
            margin-top: 8px;
        }

        .image-preview.visible {
            display: block;
        }

        .btn-primary {
            background-color: #1db954;
            border: none;
            border-radius: 50px;
            color: #000000;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            padding: 12px 32px;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #1ed760;
        }

        .alert {
            border-radius: 4px;
            font-size: 14px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.visible {
            display: block;
        }

        .alert-success {
            background-color: #1db954;
            color: #000000;
            font-weight: 600;
        }

        .alert-error {
            background-color: #e91429;
            color: #ffffff;
        }

        /* Search songs section for user playlist */
        .playlist-song-search {
            padding: 24px;
        }

        .playlist-song-search h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .search-bar input {
            background-color: #282828;
            border: 1px solid #535353;
            border-radius: 50px;
            color: #ffffff;
            font-size: 14px;
            padding: 12px 20px;
            width: 100%;
            max-width: 400px;
            outline: none;
        }

        .search-bar button {
            background-color: #ffffff;
            border: none;
            border-radius: 50px;
            color: #000000;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            padding: 12px 24px;
        }

        .song-result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .song-result-row:hover {
            background-color: #282828;
        }

        .song-result-row .song-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .song-result-row img {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
        }

        .song-result-row .song-name {
            font-size: 14px;
            font-weight: 600;
        }

        .song-result-row .song-artist {
            font-size: 12px;
            color: #b3b3b3;
        }

        .add-btn {
            background-color: #1db954;
            border: none;
            border-radius: 50px;
            color: #000000;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 14px;
        }

        .remove-btn {
            background: none;
            border: 1px solid #535353;
            border-radius: 50px;
            color: #ffffff;
            cursor: pointer;
            font-size: 12px;
            padding: 6px 14px;
        }
    </style>
</head>
<body>

    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="index.html" class="sidebar-logo">HEXAGON</a>
            <nav class="sidebar-nav">
                <a href="index.html">
                    <span>&#9750;</span>
                    Home
                </a>
                <a href="search.html">
                    <span>&#9906;</span>
                    Search
                </a>
            </nav>
        </div>
        <div class="sidebar-library">
            <div class="library-header">
                <h2>Your Library</h2>
                <button id="createPlaylistBtn" title="Create Playlist">+</button>
            </div>
            <div id="libraryItems"></div>
        </div>
    </aside>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main-content">

        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-left">
                <button class="nav-arrow" onclick="history.back()">&#8592;</button>
                <button class="nav-arrow" onclick="history.forward()">&#8594;</button>
            </div>
            <div class="navbar-right">

                <!-- Notification bell -->
                <div class="notification-wrapper">
                    <button class="bell-btn" id="bellBtn">&#9825;</button>
                    <span class="notification-badge" id="notificationBadge">0</span>
                    <div class="notification-dropdown" id="notificationDropdown">
                        <div class="notification-dropdown-header">Notifications</div>
                        <div id="notificationList"></div>
                    </div>
                </div>

                <!-- Settings dropdown -->
                <div class="settings-wrapper">
                    <button class="settings-btn" id="settingsBtn">
                        <span class="user-name" id="userName">User</span>
                        <div class="user-avatar" id="userAvatar">U</div>
                    </button>
                    <div class="settings-dropdown" id="settingsDropdown">
                        <a href="account.html">Account Details</a>
                        <hr class="divider">
                        <button id="logoutBtn">Log Out</button>
                    </div>
                </div>

            </div>
        </nav>

        <!-- Content will be either create form or playlist detail -->
        <div id="pageContent"></div>

    </main>

    <!-- ==================== MUSIC PLAYER ==================== -->
    <div class="player">
        <div class="player-left" id="playerLeft">
            <div class="player-empty">Select a song to play</div>
        </div>
        <div class="player-center" id="playerCenter" style="display: none;">
            <div class="player-controls">
                <button class="control-btn" id="prevBtn">&#9664;&#9664;</button>
                <button class="play-btn" id="playBtn">&#9654;</button>
                <button class="control-btn" id="nextBtn">&#9654;&#9654;</button>
            </div>
            <div class="player-progress">
                <span class="player-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <span class="player-time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="player-right" id="playerRight" style="display: none;">
            <button class="volume-btn" id="volumeBtn">&#9836;</button>
            <div class="volume-bar" id="volumeBar">
                <div class="volume-fill" id="volumeFill" style="width: 70%"></div>
            </div>
        </div>
    </div>

    <!-- ==================== LOGIN WALL POPUP ==================== -->
    <div class="login-wall-overlay" id="loginWallOverlay">
        <div class="login-wall-popup">
            <div class="login-wall-text">
                <h3>Start listening with our account</h3>
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
            <div class="login-wall-buttons">
                <a href="register.html" class="btn-signup">Sign up here</a>
                <button class="btn-close" id="closeLoginWall">&#10005;</button>
            </div>
        </div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audioPlayer"></audio>

    <!-- Link to JavaScript files -->
    <script src="js/player.js"></script>
    <script src="js/library.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/playlist.js"></script>

</body>
</html>
